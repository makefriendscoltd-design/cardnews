<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  :root{ --paper:#FFFFFF; --blue:#2563EB; --ice:#BBD0FF; --mut:#C3D2F5 }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Pretendard',sans-serif;color:var(--paper);
    width:1080px;height:1350px;padding:112px 92px;
    background:
      radial-gradient(1000px 560px at 85% 0%, #3B82F6, transparent 58%),
      linear-gradient(158deg,#2563EB 0%,#1D4ED8 48%,#0E2A6E 100%);
    display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}
  .topline{position:absolute;top:0;left:0;right:0;height:5px;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.7),transparent)}
  .center{flex:1;display:flex;flex-direction:column;justify-content:center;gap:46px}
  .head{font-size:102px;font-weight:800;line-height:1.1;letter-spacing:-0.035em}
  .head em{font-style:normal;color:var(--ice)}
  .desc{font-size:38px;font-weight:500;color:#DCE6FF;line-height:1.55;max-width:820px}
  .cta{display:flex;gap:24px;flex-wrap:wrap}
  .pill{display:inline-flex;align-items:center;gap:12px;font-size:34px;font-weight:700;
    padding:24px 44px;border-radius:999px}
  .pill.save{background:#fff;color:var(--blue)}
  .pill.follow{background:transparent;color:#fff;border:2px solid rgba(255,255,255,.55)}
  .foot{display:flex;justify-content:space-between;align-items:center;
    border-top:2px solid rgba(255,255,255,.22);padding-top:34px}
  .brand{font-size:36px;font-weight:800}
  .hint{font-size:28px;color:var(--ice);font-weight:600}
</style>
</head>
<body>
  <div class="topline"></div>
  <div class="center">
    <h2 class="head">오늘 바로<br><em>생성기 하나</em> 만들기</h2>
    <p class="desc">클로드 디자인 워크스페이스를 열고<br>첫 대량 생성기 프롬프트를 입력해 보세요.</p>
    <div class="cta">
      <span class="pill save">🔖 저장하기</span>
      <span class="pill follow">＋ 팔로우</span>
    </div>
  </div>
  <div class="foot">
    <span class="brand">@aimax</span>
    <span class="hint">댓글 ‘POD’ 남기면 프롬프트 드려요 &gt;</span>
  </div>
</body>
</html>
