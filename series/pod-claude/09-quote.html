<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  :root{ --paper:#FFFFFF; --ice:#BBD0FF; --mut:#C3D2F5 }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Pretendard',sans-serif;color:var(--paper);
    width:1080px;height:1350px;padding:120px 100px;
    background:
      radial-gradient(900px 520px at 20% 110%, #3B82F6, transparent 60%),
      linear-gradient(158deg,#2563EB 0%,#1D4ED8 48%,#0E2A6E 100%);
    display:flex;flex-direction:column;justify-content:center;gap:52px;position:relative;overflow:hidden}
  .mark{font-family:Georgia,serif;font-size:260px;font-weight:700;line-height:.6;height:128px;color:rgba(255,255,255,.85)}
  .quote{font-size:78px;font-weight:800;line-height:1.32;letter-spacing:-0.03em}
  .quote .hl{color:var(--ice)}
  .by{display:flex;align-items:center;gap:22px;font-size:34px;font-weight:600;color:var(--ice)}
  .by::before{content:"";width:64px;height:3px;background:var(--ice);border-radius:2px}
  .brand{position:absolute;bottom:96px;left:100px;font-size:28px;font-weight:700;color:var(--mut)}
</style>
</head>
<body>
  <div class="mark">&ldquo;</div>
  <p class="quote">성공은 천재적인 디자인 1개가 아니라,<br>AI로 만든 <span class="hl">시스템의 복리 효과</span>에 달려 있다.</p>
  <div class="by">핵심 한 줄 요약</div>
  <span class="brand">@aimax</span>
</body>
</html>
