<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  :root{ --blue:#2563EB; --paper:#FFFFFF; --hl:#D9E5FF; --ink:#0F1B33; --mut:#6B7A99; --line:#E6ECF7 }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Pretendard',sans-serif;background:var(--paper);color:var(--ink);
    width:1080px;height:1350px;padding:104px 92px;display:flex;flex-direction:column}
  .top{display:flex;align-items:baseline;justify-content:space-between;
    padding-bottom:36px;border-bottom:2px solid var(--line)}
  .idx{font-size:30px;font-weight:700;color:var(--mut);letter-spacing:.05em}
  .idx b{color:var(--blue)}
  .tag{font-size:26px;font-weight:700;letter-spacing:.12em;color:var(--mut);text-transform:uppercase}
  .body{flex:1;display:flex;flex-direction:column;justify-content:center;gap:42px}
  .bignum{font-size:150px;font-weight:800;line-height:.8;color:var(--blue);letter-spacing:-0.04em}
  .head{font-size:86px;font-weight:800;line-height:1.14;letter-spacing:-0.03em}
  .head .mark{background:linear-gradient(transparent 56%,var(--hl) 0);padding:0 6px;color:var(--blue)}
  .desc{font-size:40px;font-weight:500;line-height:1.62;color:#384154;max-width:880px}
  .desc b{color:var(--ink);font-weight:700;background:linear-gradient(transparent 60%,var(--hl) 0)}
  .foot{display:flex;justify-content:space-between;align-items:center}
  .brand{font-size:28px;font-weight:700;color:var(--mut)}
  .swipe{font-size:30px;font-weight:800;color:var(--blue);letter-spacing:.1em}
</style>
</head>
<body>
  <div class="top"><span class="idx"><b>01</b> / 05</span><span class="tag">Strategy</span></div>
  <div class="body">
    <div class="bignum">01</div>
    <h2 class="head">무에서 창조 말고<br><span class="mark">검증된 패턴</span>을 복제</h2>
    <p class="desc">잘 팔리는 문구 하나를 낚시·게임·커피 등 수십 개 니치로 확장하세요. <b>아이디어 1개 → 제품 50개+</b>로 불어납니다.</p>
  </div>
  <div class="foot"><span class="brand">@aimax</span><span class="swipe">&gt;&gt;&gt;&gt;</span></div>
</body>
</html>
