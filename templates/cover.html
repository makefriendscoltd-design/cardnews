<!-- @dsCard group="카드뉴스" name="표지 카드" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  :root{
    --bg:#0A0A0C; --paper:#F5F4F0; --accent:#8B5CF6; --accent2:#C4B5FD; --mut:#8A8A93;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1080px;height:1350px}
  body{
    font-family:'Pretendard',sans-serif;
    background:var(--bg); color:var(--paper);
    width:1080px;height:1350px;padding:110px 92px;
    display:flex;flex-direction:column;justify-content:space-between;
    position:relative;overflow:hidden;
  }
  /* cinematic light leaks */
  .leak{position:absolute;border-radius:50%;filter:blur(10px);pointer-events:none}
  .leak.a{width:680px;height:680px;top:-220px;right:-200px;
    background:radial-gradient(circle,rgba(139,92,246,.55),transparent 68%)}
  .leak.b{width:520px;height:520px;bottom:-180px;left:-160px;
    background:radial-gradient(circle,rgba(99,102,241,.30),transparent 70%)}
  .topline{position:absolute;top:0;left:0;right:0;height:5px;
    background:linear-gradient(90deg,transparent,var(--accent2),transparent);opacity:.8}
  .head-zone{position:relative;z-index:2}
  .badge{display:inline-flex;align-items:center;gap:14px;
    border:2px solid rgba(196,181,253,.55);border-radius:999px;
    padding:14px 30px;font-size:28px;font-weight:700;letter-spacing:.12em;
    color:var(--accent2);text-transform:uppercase}
  .badge::before{content:"";width:12px;height:12px;border-radius:50%;
    background:var(--accent);box-shadow:0 0 16px var(--accent)}
  .title{margin-top:48px;font-size:124px;font-weight:800;line-height:1.06;
    letter-spacing:-0.035em}
  .title em{font-style:normal;
    background:linear-gradient(180deg,var(--accent2),var(--accent));
    -webkit-background-clip:text;background-clip:text;color:transparent}
  .sub{position:relative;z-index:2;font-size:36px;font-weight:500;
    line-height:1.55;color:#BFBFC7;max-width:820px}
  .foot{position:relative;z-index:2;display:flex;justify-content:space-between;align-items:flex-end}
  .brand{font-size:32px;font-weight:700;letter-spacing:-0.01em}
  .swipe{font-size:34px;font-weight:800;color:var(--accent2);letter-spacing:.1em}
</style>
</head>
<body>
  <div class="topline"></div>
  <div class="leak a"></div>
  <div class="leak b"></div>

  <div class="head-zone">
    <span class="badge">Claude Insight</span>
    <h1 class="title">2026년<br>주목할 <em>AI 트렌드</em><br>5가지</h1>
  </div>

  <p class="sub">올해 콘텐츠·업무를 바꿀 핵심 흐름을<br>카드 한 장씩 정리했습니다.</p>

  <div class="foot">
    <span class="brand">@your_handle</span>
    <span class="swipe">&gt;&gt;&gt;&gt;</span>
  </div>
</body>
</html>
