<!-- @dsCard group="카드뉴스" name="본문 카드" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  :root{ --ink:#16161A; --paper:#F5F4F0; --accent:#8B5CF6; --hl:#E6DCFF; --mut:#8A8A93; --line:#E3E1DA }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Pretendard',sans-serif;
    background:var(--paper); color:var(--ink);
    width:1080px;height:1350px;padding:104px 92px;
    display:flex;flex-direction:column;
  }
  .top{display:flex;align-items:baseline;justify-content:space-between;
    padding-bottom:36px;border-bottom:2px solid var(--line)}
  .idx{font-size:30px;font-weight:700;color:var(--mut);letter-spacing:.05em}
  .idx b{color:var(--accent)}
  .tag{font-size:26px;font-weight:700;letter-spacing:.1em;color:var(--mut);text-transform:uppercase}
  .body{flex:1;display:flex;flex-direction:column;justify-content:center;gap:44px}
  .bignum{font-size:150px;font-weight:800;line-height:.8;color:var(--accent);
    letter-spacing:-0.04em}
  .head{font-size:88px;font-weight:800;line-height:1.12;letter-spacing:-0.03em}
  .head .mark{background:linear-gradient(transparent 56%,var(--hl) 0);padding:0 6px}
  .desc{font-size:40px;font-weight:500;line-height:1.62;color:#3A3A40;max-width:860px}
  .desc b{color:var(--ink);font-weight:700}
  .foot{display:flex;justify-content:space-between;align-items:center}
  .brand{font-size:28px;font-weight:700;color:var(--mut)}
  .swipe{font-size:30px;font-weight:800;color:var(--accent);letter-spacing:.1em}
</style>
</head>
<body>
  <div class="top">
    <span class="idx"><b>01</b> / 05</span>
    <span class="tag">AI Trends</span>
  </div>

  <div class="body">
    <div class="bignum">01</div>
    <h2 class="head">사람을 대신해<br><span class="mark">일하는 AI</span></h2>
    <p class="desc">단순 답변을 넘어 <b>스스로 도구를 쓰고 작업을 끝내는</b> 에이전트가 표준이 됩니다. 반복 업무는 맡기고, 사람은 판단에 집중하세요.</p>
  </div>

  <div class="foot">
    <span class="brand">@your_handle</span>
    <span class="swipe">&gt;&gt;&gt;&gt;</span>
  </div>
</body>
</html>
